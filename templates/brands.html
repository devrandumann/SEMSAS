<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands - SEMSAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#FFF3E0', 100: '#FFE0B2', 400: '#FFCC80',
                            500: '#FF9F43', 600: '#FB8C00', 900: '#E65100'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col z-10 shadow-sm">
            <div class="h-16 flex items-center px-6 border-b border-slate-100">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center mr-3 text-white">
                    <i data-lucide="box" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">SEMSAS</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="/"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Dashboard
                </a>
                <a href="/products"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i> Products
                </a>
                <a href="/brands"
                    class="flex items-center px-4 py-3 text-brand-600 bg-brand-50 rounded-xl font-medium transition-colors">
                    <i data-lucide="award" class="w-5 h-5 mr-3"></i> Brands
                </a>
                <a href="/stores"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="store" class="w-5 h-5 mr-3"></i> Stores
                </a>
                <a href="/shelves"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layers" class="w-5 h-5 mr-3"></i> Shelves
                </a>
                <a href="/promotions"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="tag" class="w-5 h-5 mr-3"></i> Promotions
                </a>
                <a href="/alerts"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="bell" class="w-5 h-5 mr-3"></i> Alerts
                    <span class="ml-auto bg-red-100 text-red-600 py-0.5 px-2 rounded-full text-xs font-bold">3</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center p-3 rounded-xl bg-slate-50 mb-3">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold"
                        id="user-avatar">
                        --
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-slate-700" id="user-name">Loading...</p>
                        <p class="text-xs text-slate-500" id="user-role">--</p>
                    </div>
                </div>
                <button onclick="handleLogout()"
                    class="w-full flex items-center justify-center px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition-colors cursor-pointer">
                    <i data-lucide="log-out" class="w-4 h-4 mr-2"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative">
            <div class="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Brand Management</h1>
                        <p class="text-slate-500 mt-1">Manage product brands and manufacturers</p>
                    </div>
                </div>

                <!-- Brands Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="brands-container">
                    <div class="text-center text-slate-400 py-8">Loading...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Load current user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const user = await response.json();

                // Update user display
                const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
                document.getElementById('user-name').textContent = user.full_name;

                if (user.role === 'admin') {
                    document.getElementById('user-role').textContent = 'Administrator';
                } else {
                    document.getElementById('user-role').textContent = `${user.store_name} Manager`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login';
            }
        }

        // Logout function
        async function handleLogout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        async function loadBrands() {
            try {
                const res = await fetch('/api/brands');
                const brands = await res.json();
                const container = document.getElementById('brands-container');
                container.innerHTML = '';

                if (brands.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 py-8">No brands found.</div>';
                    return;
                }

                brands.forEach(brand => {
                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 hover:shadow-md transition-all">
                            <div class="flex items-center justify-center mb-4">
                                <div class="w-16 h-16 bg-gradient-to-br from-brand-100 to-brand-200 rounded-2xl flex items-center justify-center">
                                    <i data-lucide="award" class="w-8 h-8 text-brand-600"></i>
                                </div>
                            </div>
                            <h3 class="text-center text-lg font-bold text-slate-900 mb-2">${brand.Brand_Name}</h3>
                            <p class="text-center text-xs text-slate-500 font-medium">ID: ${brand.Brand_ID}</p>
                        </div>
                    `;
                    container.innerHTML += card;
                });
                lucide.createIcons();
            } catch (err) {
                console.error('Error loading brands:', err);
            }
        }

        loadUserInfo();
        loadBrands();
    </script>
</body>

</html>
