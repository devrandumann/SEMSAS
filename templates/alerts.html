<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - SEMSAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#FFF3E0', 100: '#FFE0B2', 400: '#FFCC80',
                            500: '#FF9F43', 600: '#FB8C00', 900: '#E65100'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col z-10 shadow-sm">
            <div class="h-16 flex items-center px-6 border-b border-slate-100">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center mr-3 text-white">
                    <i data-lucide="box" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">SEMSAS</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="/"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Dashboard
                </a>
                <a href="/products"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i> Products
                </a>
                <a href="/brands"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="award" class="w-5 h-5 mr-3"></i> Brands
                </a>
                <a href="/stores"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="store" class="w-5 h-5 mr-3"></i> Stores
                </a>
                <a href="/shelves"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layers" class="w-5 h-5 mr-3"></i> Shelves
                </a>
                <a href="/promotions"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="tag" class="w-5 h-5 mr-3"></i> Promotions
                </a>
                <a href="/alerts"
                    class="flex items-center px-4 py-3 text-brand-600 bg-brand-50 rounded-xl font-medium transition-colors">
                    <i data-lucide="bell" class="w-5 h-5 mr-3"></i> Alerts
                    <span class="ml-auto bg-red-100 text-red-600 py-0.5 px-2 rounded-full text-xs font-bold"
                        id="alert-count">0</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center p-3 rounded-xl bg-slate-50 mb-3">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold"
                        id="user-avatar">
                        --
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-slate-700" id="user-name">Loading...</p>
                        <p class="text-xs text-slate-500" id="user-role">--</p>
                    </div>
                </div>
                <button onclick="handleLogout()"
                    class="w-full flex items-center justify-center px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition-colors cursor-pointer">
                    <i data-lucide="log-out" class="w-4 h-4 mr-2"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative">
            <div class="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">System Alerts</h1>
                        <p class="text-slate-500 mt-1">Monitor critical notifications and warnings</p>
                    </div>
                </div>

                <!-- Alerts List -->
                <div class="space-y-4" id="alerts-container">
                    <div class="text-center text-slate-400 py-8">Loading...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const user = await response.json();
                const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
                document.getElementById('user-name').textContent = user.full_name;
                if (user.role === 'admin') {
                    document.getElementById('user-role').textContent = 'Administrator';
                } else {
                    document.getElementById('user-role').textContent = `${user.store_name} Manager`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login';
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }

        async function loadAlertCount() {
            try {
                const response = await fetch('/api/alerts');
                const alerts = await response.json();
                const countElement = document.getElementById('alert-count');
                if (countElement) {
                    countElement.textContent = alerts.length;
                }
            } catch (error) {
                console.error('Error loading alert count:', error);
            }
        }

        lucide.createIcons();
        loadUserInfo();
        loadAlertCount();

        async function loadAlerts() {
            try {
                const res = await fetch('/api/alerts');
                const alerts = await res.json();
                const container = document.getElementById('alerts-container');
                container.innerHTML = '';

                document.getElementById('alert-count').textContent = alerts.filter(a => a.Status === 'Pending').length;

                if (alerts.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 py-8">No alerts found.</div>';
                    return;
                }

                alerts.forEach(alert => {
                    let iconBg = 'bg-slate-100';
                    let iconColor = 'text-slate-500';
                    let icon = 'info';
                    let borderColor = 'border-slate-200';

                    if (alert.Alert_Type.includes('Expiry') || alert.Alert_Type.includes('Critical')) {
                        iconBg = 'bg-red-100';
                        iconColor = 'text-red-600';
                        icon = 'alert-triangle';
                        borderColor = 'border-red-200';
                    } else if (alert.Alert_Type.includes('Stock') || alert.Alert_Type.includes('Low')) {
                        iconBg = 'bg-orange-100';
                        iconColor = 'text-orange-600';
                        icon = 'package-x';
                        borderColor = 'border-orange-200';
                    } else if (alert.Alert_Type.includes('Price')) {
                        iconBg = 'bg-green-100';
                        iconColor = 'text-green-600';
                        icon = 'tag';
                        borderColor = 'border-green-200';
                    }

                    let statusBadge = '';
                    if (alert.Status === 'Pending') {
                        statusBadge = '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">⚠️ Pending</span>';
                    } else if (alert.Status === 'In Progress') {
                        statusBadge = '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">🔄 In Progress</span>';
                    } else {
                        statusBadge = '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">✓ Resolved</span>';
                    }

                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm border-2 ${borderColor} p-6 hover:shadow-md transition-all">
                            <div class="flex items-start gap-4">
                                <div class="flex-shrink-0 w-14 h-14 ${iconBg} rounded-xl flex items-center justify-center ${iconColor}">
                                    <i data-lucide="${icon}" class="w-7 h-7"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="text-lg font-bold text-slate-900">${alert.Alert_Type}</h3>
                                        ${statusBadge}
                                    </div>
                                    <div class="space-y-2 text-sm text-slate-600">
                                        <p><i data-lucide="box" class="w-4 h-4 inline mr-2"></i><span class="font-semibold text-slate-900">${alert.Product_Name}</span></p>
                                        <p><i data-lucide="store" class="w-4 h-4 inline mr-2"></i>${alert.Store_Name}</p>
                                        <p><i data-lucide="user" class="w-4 h-4 inline mr-2"></i>Assigned to: ${alert.Employee_Name}</p>
                                        <p><i data-lucide="calendar" class="w-4 h-4 inline mr-2"></i>${alert.Alert_Date}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
                lucide.createIcons();
            } catch (err) {
                console.error('Error loading alerts:', err);
            }
        }

        loadAlerts();
    </script>
</body>

</html>
