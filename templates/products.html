<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - SEMSAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#FFF3E0', 100: '#FFE0B2', 400: '#FFCC80',
                            500: '#FF9F43', 600: '#FB8C00', 900: '#E65100'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        tbody tr {
            transition: all 0.2s;
        }

        tbody tr:hover {
            background-color: #FFF3E0;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col z-10 shadow-sm">
            <div class="h-16 flex items-center px-6 border-b border-slate-100">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center mr-3 text-white">
                    <i data-lucide="box" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">SEMSAS</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="/"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Dashboard
                </a>
                <a href="/products"
                    class="flex items-center px-4 py-3 text-brand-600 bg-brand-50 rounded-xl font-medium transition-colors">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i> Products
                </a>
                <a href="/brands"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="award" class="w-5 h-5 mr-3"></i> Brands
                </a>
                <a href="/stores"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="store" class="w-5 h-5 mr-3"></i> Stores
                </a>
                <a href="/shelves"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layers" class="w-5 h-5 mr-3"></i> Shelves
                </a>
                <a href="/promotions"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="tag" class="w-5 h-5 mr-3"></i> Promotions
                </a>
                <a href="/alerts"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="bell" class="w-5 h-5 mr-3"></i> Alerts
                    <span class="ml-auto bg-red-100 text-red-600 py-0.5 px-2 rounded-full text-xs font-bold">3</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center p-3 rounded-xl bg-slate-50 mb-3">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold"
                        id="user-avatar">
                        --
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-slate-700" id="user-name">Loading...</p>
                        <p class="text-xs text-slate-500" id="user-role">--</p>
                    </div>
                </div>
                <button onclick="handleLogout()"
                    class="w-full flex items-center justify-center px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition-colors cursor-pointer">
                    <i data-lucide="log-out" class="w-4 h-4 mr-2"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative">
            <div class="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Product Management</h1>
                        <p class="text-slate-500 mt-1">Manage your product catalog</p>
                    </div>
                    <button onclick="openAddProductModal()"
                        class="flex items-center px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 font-medium shadow-md shadow-brand-500/30 transition-all cursor-pointer">
                        <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Add New Product
                    </button>
                </div>

                <!-- Products Table -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100">
                    <div class="p-6 border-b border-slate-100">
                        <h2 class="text-lg font-bold text-slate-800">All Products</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="p-4 font-semibold">ID</th>
                                    <th class="p-4 font-semibold">Product Name</th>
                                    <th class="p-4 font-semibold">Category</th>
                                    <th class="p-4 font-semibold">Brand</th>
                                    <th class="p-4 font-semibold text-right">Price</th>
                                    <th class="p-4 font-semibold text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="products-table" class="text-sm text-slate-700 divide-y divide-slate-100">
                                <tr>
                                    <td colspan="6" class="p-4 text-center text-slate-400">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Product Modal -->
    <div id="addProductModal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-900">Add New Product</h3>
                <button onclick="closeAddProductModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="addProductForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Product Name</label>
                    <input type="text" name="product_name" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                    <input type="number" step="0.01" name="price" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                    <select name="category_id" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                        id="category-select">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Brand</label>
                    <select name="brand_id" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                        id="brand-select">
                        <option value="">Select Brand</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeAddProductModal()"
                        class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium">Cancel</button>
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 font-medium">Add
                        Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Load current user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const user = await response.json();

                // Update user display
                const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
                document.getElementById('user-name').textContent = user.full_name;

                if (user.role === 'admin') {
                    document.getElementById('user-role').textContent = 'Administrator';
                } else {
                    document.getElementById('user-role').textContent = `${user.store_name} Manager`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login';
            }
        }

        // Logout function
        async function handleLogout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }

        function openAddProductModal() {
            document.getElementById('addProductModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeAddProductModal() {
            document.getElementById('addProductModal').classList.add('hidden');
            document.getElementById('addProductForm').reset();
        }

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const tbody = document.getElementById('products-table');
                tbody.innerHTML = '';

                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-400">No products found.</td></tr>';
                    return;
                }

                products.forEach(p => {
                    const row = `
                        <tr class="hover:bg-brand-50/50">
                            <td class="p-4 font-medium">${p.Product_ID}</td>
                            <td class="p-4 font-semibold text-slate-800">${p.Product_Name}</td>
                            <td class="p-4 text-slate-600">${p.Category_Name || '-'}</td>
                            <td class="p-4 text-slate-600">${p.Brand_Name || '-'}</td>
                            <td class="p-4 text-right font-semibold text-slate-800">$${parseFloat(p.Current_Price).toFixed(2)}</td>
                            <td class="p-4 text-center">
                                <button onclick="deleteProduct(${p.Product_ID})" class="text-red-600 hover:text-red-800 font-medium text-sm">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error('Error loading products:', err);
            }
        }

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const categories = await res.json();
                const select = document.getElementById('category-select');
                categories.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.Category_ID;
                    option.textContent = c.Category_Name;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        async function loadBrands() {
            try {
                const res = await fetch('/api/brands');
                const brands = await res.json();
                const select = document.getElementById('brand-select');
                brands.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.Brand_ID;
                    option.textContent = b.Brand_Name;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading brands:', err);
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                product_name: formData.get('product_name'),
                price: parseFloat(formData.get('price')),
                category_id: parseInt(formData.get('category_id')),
                brand_id: parseInt(formData.get('brand_id'))
            };

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    closeAddProductModal();
                    loadProducts();
                    alert('Product added successfully!');
                } else {
                    alert('Error adding product');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error adding product');
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadProducts();
                    alert('Product deleted successfully!');
                } else {
                    alert('Error deleting product');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error deleting product');
            }
        }

        // Load user info first, then load products
        loadUserInfo();
        loadProducts();
        loadCategories();
        loadBrands();
    </script>
</body>

</html>
