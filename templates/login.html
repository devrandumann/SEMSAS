<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SEMSAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#FFF3E0',
                            100: '#FFE0B2',
                            400: '#FFCC80',
                            500: '#FF9F43',
                            600: '#FB8C00',
                            900: '#E65100',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-field {
            transition: all 0.3s;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 159, 67, 0.2);
        }

        .btn-login {
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 159, 67, 0.4);
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Floating Background Shapes -->
    <div class="floating-shape bg-white w-64 h-64" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="floating-shape bg-brand-500 w-48 h-48" style="top: 60%; right: 15%; animation-delay: 7s;"></div>
    <div class="floating-shape bg-white w-32 h-32" style="bottom: 20%; left: 20%; animation-delay: 14s;"></div>

    <!-- Login Card -->
    <div class="login-card rounded-3xl shadow-2xl p-8 md:p-12 w-full max-w-md relative z-10">

        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-gradient-to-br from-brand-500 to-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="box" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">SEMSAS</h1>
            <p class="text-slate-500 text-sm">Smart Expiry Management & Shelf Alert System</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
            <div class="flex items-center">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 mr-2"></i>
                <p class="text-sm text-red-600 font-medium" id="error-text"></p>
            </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">

            <!-- Username Field -->
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">
                    <i data-lucide="user" class="w-4 h-4 inline mr-1"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" required autocomplete="username"
                    class="input-field w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                    placeholder="Enter your username">
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">
                    <i data-lucide="lock" class="w-4 h-4 inline mr-1"></i>
                    Password
                </label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="input-field w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
                    placeholder="Enter your password">
            </div>

            <!-- Login Button -->
            <button type="submit" id="login-btn"
                class="btn-login w-full bg-gradient-to-r from-brand-500 to-brand-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl flex items-center justify-center">
                <i data-lucide="log-in" class="w-5 h-5 mr-2"></i>
                <span id="login-btn-text">Sign In</span>
            </button>
        </form>

    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const loginBtn = document.getElementById('login-btn');
        const loginBtnText = document.getElementById('login-btn-text');

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
                loginBtnText.textContent = 'Signing in...';
            } else {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                loginBtnText.textContent = 'Sign In';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to dashboard
                    window.location.href = '/';
                } else {
                    showError(data.message || 'Login failed. Please try again.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
                setLoading(false);
            }
        });
    </script>
</body>

</html>
