<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelves - SEMSAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#FFF3E0', 100: '#FFE0B2', 400: '#FFCC80',
                            500: '#FF9F43', 600: '#FB8C00', 900: '#E65100'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        tbody tr {
            transition: all 0.2s;
        }

        tbody tr:hover {
            background-color: #FFF3E0;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col z-10 shadow-sm">
            <div class="h-16 flex items-center px-6 border-b border-slate-100">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center mr-3 text-white">
                    <i data-lucide="box" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">SEMSAS</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="/"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> Dashboard
                </a>
                <a href="/products"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i> Products
                </a>
                <a href="/brands"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="award" class="w-5 h-5 mr-3"></i> Brands
                </a>
                <a href="/stores"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="store" class="w-5 h-5 mr-3"></i> Stores
                </a>
                <a href="/shelves"
                    class="flex items-center px-4 py-3 text-brand-600 bg-brand-50 rounded-xl font-medium transition-colors">
                    <i data-lucide="layers" class="w-5 h-5 mr-3"></i> Shelves
                </a>
                <a href="/promotions"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="tag" class="w-5 h-5 mr-3"></i> Promotions
                </a>
                <a href="/alerts"
                    class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors">
                    <i data-lucide="bell" class="w-5 h-5 mr-3"></i> Alerts
                    <span class="ml-auto bg-red-100 text-red-600 py-0.5 px-2 rounded-full text-xs font-bold"
                        id="alert-count">0</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center p-3 rounded-xl bg-slate-50 mb-3">
                    <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold"
                        id="user-avatar">
                        --
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-slate-700" id="user-name">Loading...</p>
                        <p class="text-xs text-slate-500" id="user-role">--</p>
                    </div>
                </div>
                <button onclick="handleLogout()"
                    class="w-full flex items-center justify-center px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition-colors cursor-pointer">
                    <i data-lucide="log-out" class="w-4 h-4 mr-2"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative">
            <div class="p-6 md:p-8 max-w-7xl mx-auto space-y-8">
                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Shelf & Inventory Management</h1>
                        <p class="text-slate-500 mt-1">Monitor shelf locations and inventory levels</p>
                    </div>
                </div>

                <!-- Shelves Table -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100">
                    <div class="p-6 border-b border-slate-100">
                        <h2 class="text-lg font-bold text-slate-800">All Shelves</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="p-4 font-semibold">Shelf ID</th>
                                    <th class="p-4 font-semibold">Store</th>
                                    <th class="p-4 font-semibold">Location</th>
                                    <th class="p-4 font-semibold text-center">Capacity</th>
                                    <th class="p-4 font-semibold text-center">Temperature</th>
                                    <th class="p-4 font-semibold text-center">Current Stock</th>
                                </tr>
                            </thead>
                            <tbody id="shelves-table" class="text-sm text-slate-700 divide-y divide-slate-100">
                                <tr>
                                    <td colspan="6" class="p-4 text-center text-slate-400">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const user = await response.json();
                const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
                document.getElementById('user-name').textContent = user.full_name;
                if (user.role === 'admin') {
                    document.getElementById('user-role').textContent = 'Administrator';
                } else {
                    document.getElementById('user-role').textContent = `${user.store_name} Manager`;
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login';
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }

        async function loadAlertCount() {
            try {
                const response = await fetch('/api/alerts');
                const alerts = await response.json();
                const countElement = document.getElementById('alert-count');
                if (countElement) {
                    countElement.textContent = alerts.length;
                }
            } catch (error) {
                console.error('Error loading alert count:', error);
            }
        }

        lucide.createIcons();
        loadUserInfo();
        loadAlertCount();

        async function loadShelves() {
            try {
                const res = await fetch('/api/shelves');
                const shelves = await res.json();
                const tbody = document.getElementById('shelves-table');
                tbody.innerHTML = '';

                if (shelves.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-400">No shelves found.</td></tr>';
                    return;
                }

                shelves.forEach(shelf => {
                    let tempBadge = '';
                    if (shelf.Temperature_Type === 'Refrigerated') {
                        tempBadge = '<span class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full text-xs font-bold">❄️ Cold</span>';
                    } else if (shelf.Temperature_Type === 'Frozen') {
                        tempBadge = '<span class="bg-cyan-100 text-cyan-700 px-2.5 py-1 rounded-full text-xs font-bold">🧊 Frozen</span>';
                    } else {
                        tempBadge = '<span class="bg-slate-100 text-slate-700 px-2.5 py-1 rounded-full text-xs font-bold">🌡️ Ambient</span>';
                    }

                    const stockPercent = shelf.Total_Stock ? Math.round((shelf.Total_Stock / shelf.Capacity) * 100) : 0;
                    let stockColor = 'text-green-600';
                    if (stockPercent > 80) stockColor = 'text-red-600';
                    else if (stockPercent > 60) stockColor = 'text-orange-600';

                    const row = `
                        <tr class="hover:bg-brand-50/50">
                            <td class="p-4 font-medium">#${shelf.Shelf_ID}</td>
                            <td class="p-4 text-slate-600">${shelf.Store_Name || '-'}</td>
                            <td class="p-4 font-semibold text-slate-800">${shelf.Shelf_Location}</td>
                            <td class="p-4 text-center text-slate-600">${shelf.Capacity}</td>
                            <td class="p-4 text-center">${tempBadge}</td>
                            <td class="p-4 text-center font-semibold ${stockColor}">${shelf.Total_Stock || 0} / ${shelf.Capacity}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error('Error loading shelves:', err);
            }
        }

        loadShelves();
    </script>
</body>

</html>
